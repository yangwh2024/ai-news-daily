<!DOCTYPE html>
<html lang="zh-CN">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>AI资讯早知道</title>
   <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
   <style>
       :root {
           --dark-900: #F8FAFC;       /* 浅色背景 */
           --dark-800: #FFFFFF;
           --dark-700: #FFFFFF;
           --dark-600: #F1F5F9;
           --dark-500: #E2E8F0;
           --dark-400: #94A3B8;       /* 辅助色 */
           --dark-300: #64748B;       /* 次要文字色 */
           --dark-200: #475569;
           --dark-100: #334155;
           --dark-50: #1E293B;        /* 主文字色 */
           --cyber-300: #0EA5E9;
           --cyber-400: #0EA5E9;      /* emergency 青色 */
           --cyber-500: #0284C7;
           --neon-purple: #7C3AED;    /* industry 紫色 */
           --neon-green: #10B981;
           --neon-orange: #F59E0B;    /* algo_eng 橙色 */
           --neon-red: #EF4444;       /* hotspot 红色 */
           --glass-bg: #FFFFFF;       /* 卡片背景 */
           --glass-border: #E2E8F0;   /* 卡片边框 */
           --gradient-cyber: linear-gradient(135deg, #0EA5E9 0%, #7C3AED 100%);
           --gradient-text: linear-gradient(to right, #0EA5E9, #7C3AED, #10B981);
           --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
           --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
           --shadow-lg: 0 10px 25px rgba(0,0,0,0.1);
       }

       * { box-sizing: border-box; margin: 0; padding: 0; }
       ::selection { background: rgba(14, 165, 233, 0.2); color: #1E293B; }
       ::-webkit-scrollbar { width: 6px; height: 6px; }
       ::-webkit-scrollbar-track { background: var(--dark-600); }
       ::-webkit-scrollbar-thumb { background: var(--dark-400); border-radius: 3px; }
       ::-webkit-scrollbar-thumb:hover { background: var(--dark-300); }

       body {
           font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
           line-height: 1.6;
           color: var(--dark-50);
           background-color: var(--dark-900);
           min-height: 100vh;
           position: relative;
       }

       /* 网格背景 + 光晕（浅色主题已禁用） */
       .bg-grid { display: none; }
       .bg-glow { display: none; }

       /* ===== 顶部导航栏 ===== */
       .navbar {
           position: sticky; top: 0; z-index: 100;
           background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px);
           border-bottom: 1px solid var(--glass-border); padding: 12px 24px;
           display: flex; align-items: center; justify-content: space-between;
       }
       .nav-brand { display: flex; align-items: center; gap: 12px; }
       .nav-logo {
           width: 40px; height: 40px; border-radius: 10px; background: var(--gradient-cyber);
           display: flex; align-items: center; justify-content: center; position: relative;
       }
       .nav-logo::after {
           content: ''; position: absolute; inset: -2px; border-radius: 12px;
           background: var(--gradient-cyber); opacity: 0.3; filter: blur(8px); z-index: -1;
           animation: pulse 3s ease-in-out infinite;
       }
       @keyframes pulse { 50% { opacity: 0.15; } }
       .nav-logo svg { width: 22px; height: 22px; color: white; }
       .nav-title {
           font-family: Orbitron, sans-serif; font-weight: 800; font-size: 18px;
           background: var(--gradient-text); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
       }
       .nav-subtitle { font-size: 11px; color: var(--dark-300); margin-top: -2px; }
       .nav-date {
           display: flex; align-items: center; gap: 8px; padding: 8px 16px;
           background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 10px;
           font-size: 13px; color: var(--dark-100); transition: all 0.3s;
       }
       .nav-date:hover { border-color: rgba(14, 165, 233, 0.3); background: rgba(241, 245, 249, 0.8); }
       .nav-date .weekday { color: var(--dark-400); font-size: 11px; }

       /* ===== 右上角历史记录下拉 ===== */
       .nav-right { position: relative; display: flex; align-items: center; gap: 10px; }
       .history-btn {
           display: flex; align-items: center; gap: 6px;
           padding: 8px 14px; border-radius: 10px; cursor: pointer;
           background: var(--glass-bg); border: 1px solid var(--glass-border);
           color: var(--dark-100); font-size: 13px; font-family: inherit;
           transition: all 0.25s;
       }
       .history-btn:hover {
           border-color: rgba(14, 165, 233, 0.4); color: var(--cyber-400);
           background: rgba(241, 245, 249, 0.8);
       }
       .history-btn.active {
           border-color: var(--cyber-400); color: var(--cyber-400);
           background: rgba(14, 165, 233, 0.1);
       }
       .history-btn svg { width: 14px; height: 14px; }
       .history-btn .arrow {
           width: 8px; height: 8px; transition: transform 0.25s;
           border-right: 1.5px solid currentColor; border-bottom: 1.5px solid currentColor;
           transform: rotate(45deg); margin-top: -3px;
       }
       .history-btn.active .arrow { transform: rotate(-135deg); margin-top: 2px; }

       .history-dropdown {
           position: absolute; top: calc(100% + 8px); right: 0;
           min-width: 280px; max-width: 340px;
           background: #FFFFFF; border: 1px solid var(--glass-border);
           border-radius: 14px;
           box-shadow: var(--shadow-lg);
           padding: 8px; z-index: 200; display: none;
           animation: dropIn 0.2s ease-out;
       }
       .history-dropdown.show { display: block; }
       @keyframes dropIn {
           from { opacity: 0; transform: translateY(-8px); }
           to { opacity: 1; transform: translateY(0); }
       }
       .history-dropdown-header {
           padding: 10px 14px 8px; font-size: 11px; color: var(--dark-400);
           text-transform: uppercase; letter-spacing: 1.2px; font-weight: 600;
           border-bottom: 1px solid var(--glass-border); margin-bottom: 4px;
       }
       .history-list { max-height: 380px; overflow-y: auto; padding: 4px; }
       .history-item {
           display: flex; align-items: center; justify-content: space-between;
           padding: 10px 12px; border-radius: 8px; cursor: pointer;
           transition: all 0.18s; border: 1px solid transparent;
       }
       .history-item:hover {
           background: rgba(241, 245, 249, 0.6); border-color: rgba(14, 165, 233, 0.2);
       }
       .history-item.active {
           background: rgba(14, 165, 233, 0.08); border-color: rgba(14, 165, 233, 0.35);
       }
       .history-item-left { display: flex; flex-direction: column; gap: 2px; min-width: 0; flex: 1; }
       .history-item-date {
           font-size: 14px; font-weight: 600; color: var(--dark-50);
           display: flex; align-items: center; gap: 8px;
       }
       .history-item-date .dot {
           width: 6px; height: 6px; border-radius: 50%; background: var(--cyber-400);
       }
       .history-item-date .dot.empty {
           background: var(--dark-500); box-shadow: none;
       }
       .history-item-weekday { font-size: 11px; color: var(--dark-400); }
       .history-item-meta {
           font-size: 11px; color: var(--dark-300); flex-shrink: 0; margin-left: 8px;
           font-family: 'JetBrains Mono', monospace;
       }
       .history-item-meta.empty { color: var(--dark-500); font-style: italic; }

       .empty-state {
           text-align: center; padding: 80px 24px; color: var(--dark-300);
           font-size: 15px; max-width: 1024px; margin: 0 auto;
       }

       /* ===== 统计横幅 ===== */
       .stats-banner { position: relative; z-index: 1; max-width: 1024px; margin: 0 auto; padding: 48px 24px 24px; }
       .stats-banner h2 { font-family: Orbitron, sans-serif; font-size: 42px; font-weight: 800; margin-bottom: 12px; }
       .stats-banner .date-text {
           background: var(--gradient-text); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
       }
       .stats-banner .meta { color: var(--dark-300); font-size: 16px; margin-bottom: 28px; }
       .stats-banner .meta .count { color: var(--cyber-400); font-weight: 600; }
       .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
       @media (min-width: 768px) { .stats-grid { grid-template-columns: repeat(5, 1fr); } }
       .stat-card {
           background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 12px;
           padding: 16px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; text-align: left;
       }
       .stat-card:hover {
           transform: translateY(-2px); border-color: rgba(14, 165, 233, 0.3);
           background: rgba(241, 245, 249, 0.8); box-shadow: var(--shadow-md);
       }
       .stat-card.active { box-shadow: 0 0 0 2px var(--cyber-400); }
       .stat-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
       .stat-icon {
           width: 36px; height: 36px; border-radius: 8px;
           display: flex; align-items: center; justify-content: center; transition: transform 0.3s;
       }
       .stat-card:hover .stat-icon { transform: scale(1.1); }
       .stat-num { font-family: Orbitron, sans-serif; font-size: 22px; font-weight: 700; }
       .stat-label { color: var(--dark-100); font-weight: 500; font-size: 13px; }
       .stat-bar { height: 3px; border-radius: 999px; margin-top: 8px; opacity: 0.3; transition: opacity 0.3s; }
       .stat-card:hover .stat-bar { opacity: 0.6; }

       /* 分类配色 */
       .cat-cyber { color: var(--cyber-400); }
       .cat-purple { color: var(--neon-purple); }
       .cat-green { color: var(--neon-green); }
       .cat-orange { color: var(--neon-orange); }
       .cat-red { color: var(--neon-red); }
       .bg-cyber { background-color: rgba(14, 165, 233, 0.125); color: var(--cyber-400); }
       .bg-purple { background-color: rgba(124, 58, 237, 0.125); color: var(--neon-purple); }
       .bg-green { background-color: rgba(0, 255, 163, 0.125); color: var(--neon-green); }
       .bg-orange { background-color: rgba(245, 158, 11, 0.125); color: var(--neon-orange); }
       .bg-red { background-color: rgba(239, 68, 68, 0.125); color: var(--neon-red); }
       .bar-cyber { background-color: var(--cyber-400); }
       .bar-purple { background-color: var(--neon-purple); }
       .bar-green { background-color: var(--neon-green); }
       .bar-orange { background-color: var(--neon-orange); }
       .bar-red { background-color: var(--neon-red); }

       /* ===== 主内容区 ===== */
       .main-wrapper { position: relative; z-index: 1; }
       .main-content { max-width: 1024px; margin: 0 auto; padding: 24px 24px 80px; }
       .sections-wrapper { display: flex; flex-direction: column; gap: 24px; }

       /* ===== 分类区块卡片 ===== */
       .section-card {
           background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px;
           padding: 24px; position: relative; overflow: hidden;
           box-shadow: var(--shadow-sm);
           animation: slideUp 0.5s ease-out forwards;
       }
       @keyframes slideUp {
           0% { opacity: 0; transform: translateY(20px); }
           100% { opacity: 1; transform: translateY(0); }
       }
       .section-card::before {
           content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; opacity: 0.8;
       }
       .section-card[data-cat="industry"]::before { background: var(--neon-purple); }
       .section-card[data-cat="hotspot"]::before { background: var(--neon-red); }
       .section-card[data-cat="emergency"]::before { background: var(--cyber-400); }
       .section-card[data-cat="algo_eng"]::before { background: var(--neon-orange); }

       .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
       .section-header-left { display: flex; align-items: center; gap: 16px; }
       .section-icon-box {
           width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center;
           justify-content: center; flex-shrink: 0; font-size: 24px;
       }
       .section-icon-box[data-cat="industry"] { background-color: rgba(124, 58, 237, 0.082); border: 1px solid rgba(124, 58, 237, 0.19); box-shadow: 0 0 20px rgba(124, 58, 237, 0.125); }
       .section-icon-box[data-cat="hotspot"] { background-color: rgba(239, 68, 68, 0.082); border: 1px solid rgba(239, 68, 68, 0.19); box-shadow: 0 0 20px rgba(239, 68, 68, 0.125); }
       .section-icon-box[data-cat="emergency"] { background-color: rgba(14, 165, 233, 0.082); border: 1px solid rgba(14, 165, 233, 0.19); box-shadow: 0 0 20px rgba(14, 165, 233, 0.125); }
       .section-icon-box[data-cat="algo_eng"] { background-color: rgba(245, 158, 11, 0.082); border: 1px solid rgba(245, 158, 11, 0.19); box-shadow: 0 0 20px rgba(245, 158, 11, 0.125); }

       .section-title {
           font-family: Orbitron, sans-serif; font-size: 22px; font-weight: 700;
           display: flex; align-items: center; gap: 8px;
       }
       .section-title[data-cat="industry"] { color: var(--neon-purple); }
       .section-title[data-cat="hotspot"] { color: var(--neon-red); }
       .section-title[data-cat="emergency"] { color: var(--cyber-400); }
       .section-title[data-cat="algo_eng"] { color: var(--neon-orange); }

       .section-count-badge {
           font-size: 13px; font-weight: 400; color: var(--dark-400);
           background: rgba(241, 245, 249, 0.6); padding: 2px 8px; border-radius: 999px;
       }
       .section-desc { font-size: 13px; color: var(--dark-300); margin-top: 2px; }

       /* 子模块标签 */
       .sub-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
       .sub-tag {
           font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 500;
       }
       .sub-tag[data-cat="industry"] { background-color: rgba(124, 58, 237, 0.063); color: rgba(124, 58, 237, 0.8); }
       .sub-tag[data-cat="hotspot"] { background-color: rgba(239, 68, 68, 0.063); color: rgba(239, 68, 68, 0.8); }
       .sub-tag[data-cat="emergency"] { background-color: rgba(14, 165, 233, 0.063); color: rgba(14, 165, 233, 0.8); }
       .sub-tag[data-cat="algo_eng"] { background-color: rgba(245, 158, 11, 0.063); color: rgba(245, 158, 11, 0.8); }

       /* 分割线 */
       .cyber-divider {
           height: 1px; margin: 16px 0;
           background: linear-gradient(90deg, transparent, rgba(14, 165, 233, 0.2), transparent);
       }

       /* ===== 新闻卡片网格 ===== */
       .news-grid {
           display: grid; grid-template-columns: 1fr; gap: 12px;
       }
       @media (min-width: 640px) { .news-grid { grid-template-columns: repeat(2, 1fr); } }

       /* 行截断（参考样例 line-clamp-2） */
       .line-clamp-2 {
           overflow: hidden; display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2;
       }
       .line-clamp-3 {
           overflow: hidden; display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 3;
       }

       /* 入场动画（参考样例 animate-slide-up） */
       .animate-slide-up {
           animation: slideUp 0.5s ease-out forwards;
       }

       /* glow-border 浅色主题禁用（hover 效果由 news-card 自身处理） */
       .glow-border { position: relative; }

       .news-card {
           background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 12px;
           padding: 16px; display: block; text-decoration: none;
           transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
           position: relative; overflow: hidden;
       }
       .news-card::before {
           content: ''; position: absolute; top: 0; bottom: 0; left: 0; width: 3px;
           border-radius: 12px 0 0 12px; opacity: 0; transition: opacity 0.3s;
       }
       .news-card[data-cat="industry"]::before { background: var(--neon-purple); }
       .news-card[data-cat="hotspot"]::before { background: var(--neon-red); }
       .news-card[data-cat="emergency"]::before { background: var(--cyber-400); }
       .news-card[data-cat="algo_eng"]::before { background: var(--neon-orange); }

       .news-card:hover {
           background: rgba(241, 245, 249, 0.8); border-color: rgba(14, 165, 233, 0.3);
           transform: translateY(-2px); box-shadow: var(--shadow-md);
       }
       .news-card:hover::before { opacity: 1; }

       .news-card-title {
           font-size: 16px; font-weight: 500; color: var(--dark-50); line-height: 1.5;
           margin-bottom: 8px; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
       }
       .news-card-title > span {
           display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2;
           overflow: hidden; flex: 1;
       }
       .news-card:hover .news-card-title { color: var(--cyber-300); }
       .news-card-title svg { width: 14px; height: 14px; color: var(--dark-400); flex-shrink: 0; margin-top: 4px; transition: color 0.3s; }
       .news-card:hover .news-card-title svg { color: var(--cyber-400); }

       .news-card-desc {
           font-size: 14px; color: var(--dark-300); margin-bottom: 12px; line-height: 1.6;
           display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2;
           overflow: hidden;
       }

       /* 来源标签（参考样例：彩色边框背景） */
       .news-card-source {
           display: inline-flex; align-items: center; gap: 4px;
           padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500;
           border: 1px solid;
       }
       .news-card-source[data-cat="industry"] { background-color: rgba(124, 58, 237, 0.082); color: var(--neon-purple); border-color: rgba(124, 58, 237, 0.19); }
       .news-card-source[data-cat="hotspot"] { background-color: rgba(239, 68, 68, 0.082); color: var(--neon-red); border-color: rgba(239, 68, 68, 0.19); }
       .news-card-source[data-cat="emergency"] { background-color: rgba(14, 165, 233, 0.082); color: var(--cyber-400); border-color: rgba(14, 165, 233, 0.19); }
       .news-card-source[data-cat="algo_eng"] { background-color: rgba(245, 158, 11, 0.082); color: var(--neon-orange); border-color: rgba(245, 158, 11, 0.19); }
       .news-card-source svg { width: 11px; height: 11px; }

       /* 发布时间（带图标） */
       .news-card-time {
           display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--dark-400);
       }
       .news-card-time svg { width: 11px; height: 11px; opacity: 0.7; }

       /* ===== AI 推荐评分徽章 ===== */
       .news-card-score {
           display: inline-flex; align-items: center; gap: 3px;
           padding: 2px 9px; border-radius: 999px;
           font-size: 11px; font-weight: 700; font-family: 'JetBrains Mono', monospace;
           flex-shrink: 0; border: 1px solid; letter-spacing: 0.3px;
           transition: all 0.3s;
       }
       .news-card-score .score-icon { font-size: 10px; line-height: 1; }
       .news-card-score[data-tier="S"] {  /* ≥90 镇店之宝 */
           background: linear-gradient(135deg, rgba(245, 158, 11, 0.18), rgba(239, 68, 68, 0.18));
           color: #B45309; border-color: rgba(245, 158, 11, 0.55);
       }
       .news-card-score[data-tier="A"] {  /* 80-89 优秀 */
           background: rgba(124, 58, 237, 0.12); color: var(--neon-purple);
           border-color: rgba(124, 58, 237, 0.4);
       }
       .news-card-score[data-tier="B"] {  /* 70-79 良好 */
           background: rgba(14, 165, 233, 0.12); color: var(--cyber-400);
           border-color: rgba(14, 165, 233, 0.35);
       }
       .news-card-score[data-tier="C"] {  /* <70 一般 */
           background: rgba(241, 245, 249, 0.6); color: var(--dark-300);
           border-color: var(--glass-border);
       }
       .news-card:hover .news-card-score[data-tier="S"] {
           transform: scale(1.05);
       }
       .news-card:hover .news-card-score[data-tier="A"] {
           transform: scale(1.05);
       }

       /* 卡片底部信息栏（来源 + 时间 + 评分） */
       .news-card-meta {
           display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between;
           gap: 8px; margin-bottom: 10px;
       }
       .news-card-meta-left { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; }
       .news-card-meta-right { display: flex; align-items: center; gap: 6px; margin-left: auto; }

       /* 卡片底部 #标签列表（参考样例） */
       .news-card-hashtags {
           display: flex; flex-wrap: wrap; gap: 6px;
           padding-top: 10px; margin-top: 4px;
           border-top: 1px solid var(--glass-border);
       }
       .hashtag {
           font-size: 11px; color: var(--dark-400);
           background: rgba(241, 245, 249, 0.6); padding: 2px 8px; border-radius: 4px;
       }

       .news-card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
       .news-card-tag {
           font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 500;
           display: inline-flex; align-items: center; gap: 4px;
       }
       .news-card-tag[data-cat="industry"] { background-color: rgba(124, 58, 237, 0.082); color: var(--neon-purple); border: 1px solid rgba(124, 58, 237, 0.19); }
       .news-card-tag[data-cat="hotspot"] { background-color: rgba(239, 68, 68, 0.082); color: var(--neon-red); border: 1px solid rgba(239, 68, 68, 0.19); }
       .news-card-tag[data-cat="emergency"] { background-color: rgba(14, 165, 233, 0.082); color: var(--cyber-400); border: 1px solid rgba(14, 165, 233, 0.19); }
       .news-card-tag[data-cat="algo_eng"] { background-color: rgba(245, 158, 11, 0.082); color: var(--neon-orange); border: 1px solid rgba(245, 158, 11, 0.19); }

       // 解析 Markdown 提取新闻条目（直接从源文本按行解析，更可靠）
       function parseMarkdown(dayKey) {
           const md = document.getElementById('md-source-' + dayKey).value;
           const lines = md.split('\n');

           // sections[catKey] = 数组；每个元素可能是 { type: 'item', ... } 或 { type: 'subgroup', name, items: [] }
           const sections = {};
           const categoryOrder = ['hotspot', 'industry', 'algo_eng', 'emergency'];

           let currentCat = null;
           let currentSubGroup = null;  // 当前 H4 子分组名（仅 emergency 分类下使用）

           // 用于缓存当前列表项的点评（下一行如果是缩进的 - *推荐理由*，就附加到上一条）
           let pendingItem = null;

           for (let i = 0; i < lines.length; i++) {
               const rawLine = lines[i];
               const line = rawLine.trim();

               // 空行：清空 pendingItem 关联（但不影响点评匹配）
               if (!line) continue;

               // 过滤干扰行：孤立的 # / --- / *** 等分隔符或残缺标题
               if (/^(#+\s*)?$/.test(line) || /^(-\{3,}|\*\{3,}|_\{3,})$/.test(line)) continue;

               // H3 分类标题
               const h3Match = line.match(/^###\s+(.+)$/);
               if (h3Match) {
                   const text = h3Match[1];
                   if (text.includes('行业动态') || text.includes('行业资讯')) currentCat = 'industry';
                   else if (text.includes('热点新闻') || text.includes('重点热点')) currentCat = 'hotspot';
                   else if (text.includes('应急业务') || text.includes('应急消防') || text.includes('业务相关')) currentCat = 'emergency';
                   else if (text.includes('算法专项') || text.includes('算法专项') || text.includes('算法与工程')) currentCat = 'algo_eng';
                   else if (currentCat === 'emergency' && (text.includes('应急') || text.includes('消防'))) {
                       // AI 误把子分组写成 H3（### 应急 / ### 消防），当作 H4 处理
                       currentSubGroup = text.trim();
                       if (!sections[currentCat]) sections[currentCat] = [];
                       sections[currentCat].push({ type: 'subgroup', name: currentSubGroup, items: [] });
                       pendingItem = null;
                       continue;
                   }
                   else { currentCat = null; }
                   currentSubGroup = null;
                   if (currentCat && !sections[currentCat]) sections[currentCat] = [];
                   pendingItem = null;
                   continue;
               }

               // H4 子分组标题（仅 emergency 分类下生效）
               const h4Match = line.match(/^####\s+(.+)$/);
               if (h4Match && currentCat === 'emergency') {
                   currentSubGroup = h4Match[1].trim();
                   if (!sections[currentCat]) sections[currentCat] = [];
                   sections[currentCat].push({ type: 'subgroup', name: currentSubGroup, items: [] });
                   pendingItem = null;
                   continue;
               }

               if (!currentCat) continue;

               // 缩进的点评行：  - *推荐理由*：xxx  或  - *架构师点评*：xxx（兼容历史数据）
               const commentIndentMatch = rawLine.match(/^\s+-\s+\*?(?:推荐理由|架构师点评)\*?\s*[：:]\s*(.+)$/);
               if (commentIndentMatch && pendingItem) {
                   pendingItem.comment = commentIndentMatch[1].trim();
                   pendingItem = null;
                   continue;
               }

               // 普通列表项：- **标题** 摘要 | 来源: xxx | 发布时间: xxx ([链接](URL))
               const itemMatch = line.match(/^-\s+(.+)$/);
               if (itemMatch) {
                   const newsItem = parseNewsItemFromText(itemMatch[1], currentCat);
                   if (!newsItem) continue;

                   // 放入子分组或作为普通条目
                   if (currentSubGroup && sections[currentCat].length > 0) {
                       const lastEntry = sections[currentCat][sections[currentCat].length - 1];
                       if (lastEntry.type === 'subgroup' && lastEntry.name === currentSubGroup) {
                           lastEntry.items.push(newsItem);
                           pendingItem = newsItem;
                           continue;
                       }
                   }
                   sections[currentCat].push({ type: 'item', ...newsItem });
                   pendingItem = newsItem;
                   continue;
               }
           }
           return { sections, categoryOrder };
       }

       // 从单行 markdown 文本解析新闻条目
       // 输入示例: **标题** 摘要内容 | 来源: arXiv | 发布时间: 2026-07-04 ([原文链接](URL))
       function parseNewsItemFromText(text, catKey) {
           let rest = text.trim();

           // 1. 提取链接 ([文本](URL)) 或 ([URL](URL)) —— 取最后一个 (...) 形式
           let link = '#';
           const linkMatch = rest.match(/\(\[([^\]]*)\]\(([^)]+)\)\)/);
           if (linkMatch) {
               link = linkMatch[2];
               // 从原文中移除链接部分
               rest = rest.replace(linkMatch[0], '').trim();
           } else {
               // 兼容裸链接 [文本](URL)
               const linkMatch2 = rest.match(/\[([^\]]*)\]\(([^)]+)\)/);
               if (linkMatch2) {
                   link = linkMatch2[2];
                   rest = rest.replace(linkMatch2[0], '').trim();
               }
           }

           // 2. 提取标题（**xxx** 或 __xxx__）
           let title = '';
           const titleMatch = rest.match(/^\*\*(.+?)\*\*/) || rest.match(/^__(.+?)__/);
           if (titleMatch) {
               title = titleMatch[1].trim();
               // 如果标题形如 "[中文标题]"，去掉方括号
               const bracketMatch = title.match(/^\[([^\]]+)\]$/);
               if (bracketMatch) title = bracketMatch[1].trim();
               rest = rest.substring(titleMatch[0].length).trim();
           }

           // 3. 用 | 分隔，提取来源、发布时间
           let source = '';
           let pubTime = '';
           let summary = '';
           const pipeParts = rest.split('|').map(s => s.trim());
           if (pipeParts.length > 1) {
               // 第一部分是摘要
               summary = pipeParts[0];
               for (let k = 1; k < pipeParts.length; k++) {
                   const part = pipeParts[k];
                   const srcMatch = part.match(/^来源\s*[：:]\s*(.+)$/i);
                   if (srcMatch) { source = srcMatch[1].trim(); continue; }
                   const timeMatch = part.match(/^发布时间\s*[：:]\s*(.+)$/i);
                   if (timeMatch) { pubTime = timeMatch[1].trim(); continue; }
               }
           } else {
               summary = rest;
           }

           // 4. 清理摘要：去掉首尾标点/空白
           summary = summary.replace(/^[\s\u3000\u2014\-\|：:*#]+/, '').trim();
           summary = summary.replace(/[\s\u3000\-\|：:*#]+$/, '').trim();

           // 5. fallback：如果标题为空但摘要非空，把摘要第一句作为标题
           if (!title && summary) {
               const m = summary.match(/^(.+?)[。.!！？?]/);
               if (m) { title = m[1].trim(); }
               else { title = summary.substring(0, 30); }
           }

           // 6. 兜底保护：如果标题非空但摘要为空（AI 把所有信息塞进标题的情况）
           //    用标题作为摘要内容，保证卡片总能显示描述
           if (title && !summary) {
               summary = title;
           }

           // 7. 标题过长时截断（前端展示需要紧凑），完整信息已在 summary 中
           if (title && title.length > 30) {
               // 如果 summary 还是直接等于 title，则把完整 title 保留为 summary，截断 title
               if (summary === title) {
                   summary = title;
                   title = title.substring(0, 25) + '…';
               } else {
                   title = title.substring(0, 25) + '…';
               }
           }

           if (!title) return null;
           // AI 推荐评分：从 SCORES_MAP 按 URL 匹配（仅 today 有，历史 tab 自然无评分）
           const score = (link && SCORES_MAP && SCORES_MAP[link]) ? SCORES_MAP[link] : 0;
           return { title, link, summary, comment: '', source, pubTime, catKey, score };
       }

       // 兼容保留：从 li 元素解析（已弃用，新逻辑直接从源文本解析）
       function parseNewsItem(li, catKey) {
           return parseNewsItemFromText(li.textContent, catKey);
       }

       // 渲染单条新闻卡片 HTML（参考样例 NewsCard 结构）
       function renderNewsCard(item, catKey, config, index) {
           const animDelay = (index || 0) * 50;

           // 来源标签（彩色边框背景）
           const sourceTag = item.source ? `
               <span class="news-card-source" data-cat="${catKey}">
                   <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8V6Z"/></svg>
                   ${item.source}
               </span>` : '';

           // 发布时间（带时钟图标）
           const timeTag = item.pubTime ? `
               <span class="news-card-time" title="${item.pubTime}">
                   <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                   ${item.pubTime}
               </span>` : '';

           // AI 推荐评分徽章（4 个 tier）
           let scoreTag = '';
           if (item.score && item.score > 0) {
               let tier, icon, label;
               const s = item.score;
               if (s >= 90) { tier = 'S'; icon = '🔥'; label = '镇店之宝'; }
               else if (s >= 80) { tier = 'A'; icon = '★'; label = '优秀'; }
               else if (s >= 70) { tier = 'B'; icon = '◆'; label = '良好'; }
               else { tier = 'C'; icon = '·'; label = '一般'; }
               scoreTag = `<span class="news-card-score" data-tier="${tier}" title="AI 推荐评分 ${s}/100 (${label})"><span class="score-icon">${icon}</span>${Math.round(s)}</span>`;
           }

           // 元信息栏：左侧来源/时间，右侧评分徽章
           const metaHtml = (sourceTag || timeTag || scoreTag) ? `
               <div class="news-card-meta">
                   <div class="news-card-meta-left">
                       ${sourceTag}
                       ${timeTag}
                   </div>
                   ${scoreTag ? `<div class="news-card-meta-right">${scoreTag}</div>` : ''}
               </div>` : '';

           // 底部 #标签列表（参考样例：分类标签 + 子标签）
           const hashtags = [`#${config.name}`, '#AI'];
           if (item.source) hashtags.push(`#${item.source}`);
           const hashtagsHtml = hashtags.map(tag => `<span class="hashtag">${tag}</span>`).join('');

           return `<a class="news-card glow-border animate-slide-up" href="${item.link}" target="_blank" rel="noopener" data-cat="${catKey}" style="animation-delay:${animDelay}ms;">
               <div class="news-card-title">
                   <span>${item.title}</span>
                   <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>
               </div>
               ${item.summary ? `<div class="news-card-desc">${item.summary}</div>` : ''}
               ${metaHtml}
               ${item.comment ? `<div class="news-card-footer">
                   <div class="news-card-comment" data-cat="${catKey}"><em>推荐理由</em>：${item.comment}</div>
               </div>` : ''}
               <div class="news-card-hashtags">${hashtagsHtml}</div>
           </a>`;
       }

       // 渲染分类区块
       function renderSections(dayKey) {
           const { sections, categoryOrder } = parseMarkdown(dayKey);
           const container = document.getElementById('sections-container');
           container.innerHTML = '';

           // 检查是否有内容（历史早报缺失时显示占位）
           const hasContent = categoryOrder.some(catKey => (sections[catKey] || []).length > 0);
           if (!hasContent) {
               container.innerHTML = '<div class="empty-state">暂无该日早报数据</div>';
               // 重置顶部统计所有分类计数
               document.getElementById('total-count').textContent = '0';
               document.getElementById('count-all').textContent = '0';
               categoryOrder.forEach(catKey => {
                   const el = document.getElementById('count-' + catKey);
                   if (el) el.textContent = '0';
               });
               return;
           }

           let totalCount = 0;
       const counts = {};
       let sectionIdx = 0;

       categoryOrder.forEach(catKey => {
           const config = CATEGORY_CONFIG[catKey];
           const entries = sections[catKey] || [];

           // 统计实际新闻条数（子分组内的也算）
           let itemCount = 0;
           entries.forEach(entry => {
               if (entry.type === 'subgroup') itemCount += entry.items.length;
               else itemCount += 1;
           });
           counts[catKey] = itemCount;
           totalCount += itemCount;

           const sectionEl = document.createElement('section');
           // 入场动画延迟（section-card 自带 animation）
           const sectionDelay = sectionIdx * 100;
           sectionEl.className = 'section-card';
           sectionEl.setAttribute('data-cat', catKey);
           sectionEl.setAttribute('data-category', catKey);
           sectionEl.setAttribute('style', `animation-delay:${sectionDelay}ms;`);
           sectionIdx++;

               // 子标签
               const subTagsHtml = config.subTags.map(tag =>
                   `<span class="sub-tag" data-cat="${catKey}">${tag}</span>`
               ).join('');

               // 渲染内容：区分子分组和普通条目
               let contentHtml = '';
               if (entries.length === 0) {
                   contentHtml = '<div class="empty-section">今日暂无相关资讯</div>';
               } else {
                   let parts = [];
                   let globalIdx = 0;  // 用于动画延迟
                   let pendingItems = [];  // 连续普通条目缓冲区，合并到同一个 grid

                   // 把缓冲区里的普通条目输出到一个 news-grid（双列）
                   const flushPending = () => {
                       if (pendingItems.length === 0) return;
                       const cards = pendingItems.map(item => renderNewsCard(item, catKey, config, globalIdx++)).join('');
                       parts.push(`<div class="news-grid">${cards}</div>`);
                       pendingItems = [];
                   };

                   entries.forEach(entry => {
                       if (entry.type === 'subgroup') {
                           // 遇到子分组，先 flush 普通条目
                           flushPending();
                           if (entry.items.length === 0) return;
                           const subgroupCards = entry.items.map(item => renderNewsCard(item, catKey, config, globalIdx++)).join('');
                           parts.push(`
                               <div class="sub-group-title">
                                   <span class="sub-group-icon">▸</span>
                                   ${entry.name}
                                   <span class="sub-group-count">${entry.items.length} 条</span>
                               </div>
                               <div class="news-grid">${subgroupCards}</div>
                               <div class="sub-group-divider"></div>
                           `);
                       } else {
                           // 普通条目：先缓冲，等遇到子分组或结束时统一输出
                           const item = { title: entry.title, link: entry.link, summary: entry.summary, comment: entry.comment, source: entry.source, pubTime: entry.pubTime, score: entry.score || 0 };
                           pendingItems.push(item);
                       }
                   });
                   flushPending();  // 结束时 flush 剩余的普通条目
                   contentHtml = parts.join('');
               }

               sectionEl.innerHTML = `
                   <div class="section-header">
                       <div class="section-header-left">
                           <div class="section-icon-box" data-cat="${catKey}">${config.emoji}</div>
                           <div>
                               <div class="section-title" data-cat="${catKey}">${config.name}<span class="section-count-badge">${itemCount} 条</span></div>
                               <div class="section-desc">${config.desc}</div>
                           </div>
                       </div>
                   </div>
                   <div class="sub-tags">${subTagsHtml}</div>
                   <div class="cyber-divider"></div>
                   ${contentHtml}
               `;

               container.appendChild(sectionEl);
           });

           // 更新计数
           document.getElementById('total-count').textContent = totalCount;
           document.getElementById('count-all').textContent = totalCount;
           categoryOrder.forEach(cat => {
               const el = document.getElementById('count-' + cat);
               if (el) el.textContent = counts[cat] || 0;
           });
       }

       // 分类过滤
       function filterCategory(category, btnElement) {
           document.querySelectorAll('.stat-card').forEach(btn => btn.classList.remove('active'));
           btnElement.classList.add('active');
           const cat = btnElement.getAttribute('data-cat');
           document.querySelectorAll('[data-cat="' + cat + '"]').forEach(el => {
               if (el.classList.contains('stat-card')) {
                   el.classList.add('active');
               }
           });
           document.querySelectorAll('.section-card').forEach(sec => {
               if (category === 'all' || sec.getAttribute('data-category') === category) {
                   sec.style.display = '';
               } else {
                   sec.style.display = 'none';
               }
           });
       }

       // 日期元信息（render 时注入，供历史下拉与顶部日期联动使用）
       // 结构: today/day_1..day_7 各含 date_display / date_iso / weekday
       const DAY_META = {"today": {"date_display": "2026年07月10日", "date_iso": "2026-07-10", "weekday": "周五"}, "day_1": {"date_display": "2026年07月09日", "date_iso": "2026-07-09", "weekday": "周四"}, "day_2": {"date_display": "2026年07月08日", "date_iso": "2026-07-08", "weekday": "周三"}, "day_3": {"date_display": "2026年07月07日", "date_iso": "2026-07-07", "weekday": "周二"}, "day_4": {"date_display": "2026年07月06日", "date_iso": "2026-07-06", "weekday": "周一"}, "day_5": {"date_display": "2026年07月05日", "date_iso": "2026-07-05", "weekday": "周日"}, "day_6": {"date_display": "2026年07月04日", "date_iso": "2026-07-04", "weekday": "周六"}, "day_7": {"date_display": "2026年07月03日", "date_iso": "2026-07-03", "weekday": "周五"}};

       // 历史记录列表（今天放第一位，方便从历史日期返回今天）
       const HISTORY_DAYS = ['today', 'day_1', 'day_2', 'day_3', 'day_4', 'day_5', 'day_6', 'day_7'];

       const historyBtn = document.getElementById('history-btn');
       const historyDropdown = document.getElementById('history-dropdown');
       const historyList = document.getElementById('history-list');
       let historyRendered = false;

       function toggleHistoryDropdown(e) {
           e.stopPropagation();
           const isOpen = historyDropdown.classList.contains('show');
           if (isOpen) {
               historyDropdown.classList.remove('show');
               historyBtn.classList.remove('active');
           } else {
               historyDropdown.classList.add('show');
               historyBtn.classList.add('active');
               if (!historyRendered) {
                   renderHistoryList();
                   historyRendered = true;
               }
           }
       }

       // 点击页面其他地方关闭下拉
       document.addEventListener('click', (e) => {
           if (!historyDropdown.contains(e.target) && !historyBtn.contains(e.target)) {
               historyDropdown.classList.remove('show');
               historyBtn.classList.remove('active');
           }
       });

       function renderHistoryList() {
           historyList.innerHTML = HISTORY_DAYS.map((key) => {
               const meta = DAY_META[key] || {};
               const ta = document.getElementById('md-source-' + key);
               const mdText = ta ? ta.value.trim() : '';
               const hasContent = mdText.length > 0;
               const dotClass = hasContent ? 'dot' : 'dot empty';
               const metaClass = hasContent ? '' : 'empty';
               const metaText = hasContent ? '可查看' : '暂无数据';
               const dateLabel = meta.date_iso || key;
               const weekdayLabel = meta.weekday ? (' ' + meta.weekday) : '';
               return `
                   <div class="history-item" data-key="${key}" onclick="loadHistoryDay('${key}')">
                       <div class="history-item-left">
                           <div class="history-item-date">
                               <span class="${dotClass}"></span>
                               ${dateLabel}
                               <span class="history-item-weekday">${weekdayLabel}</span>
                           </div>
                       </div>
                       <div class="history-item-meta ${metaClass}">${metaText}</div>
                   </div>
               `;
           }).join('');
       }

       function loadHistoryDay(dayKey) {
           // 取消之前的 active，标记当前项
           document.querySelectorAll('.history-item').forEach(el => el.classList.remove('active'));
           const targetEl = document.querySelector(`.history-item[data-key="${dayKey}"]`);
           if (targetEl) targetEl.classList.add('active');

           // 关闭下拉
           historyDropdown.classList.remove('show');
           historyBtn.classList.remove('active');

           // 顶部日期联动（统一从 DAY_META 取）
           const meta = DAY_META[dayKey] || {};
           const navDateSpans = document.querySelectorAll('.nav-date span');
           if (navDateSpans.length >= 2 && meta.date_iso) {
               navDateSpans[0].textContent = meta.date_iso;
               navDateSpans[1].textContent = meta.weekday || '';
           }
           const dateTextEl = document.querySelector('.date-text');
           if (dateTextEl && meta.date_display) dateTextEl.textContent = meta.date_display;
           const metaEl = document.querySelector('.meta');
           if (metaEl) metaEl.innerHTML = 'AI资讯早知道 · 共 <span class="count" id="total-count">0</span> 条资讯';

           // 复用 renderSections：无内容时自动显示"暂无该日早报数据"
           renderSections(dayKey);
       }

       // 初始化
       renderSections('today');
   </script>
</body>
</html>
